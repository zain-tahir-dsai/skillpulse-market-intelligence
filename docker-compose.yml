services:
  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: [
      "python",
      "-m",
      "src.ingestion.run_ingestion",
      "--source",
      "remoteok"
    ]
